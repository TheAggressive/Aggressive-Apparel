name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  THEME_SLUG: Aggressive-Apparel
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  PHP_VERSION: '8.2'

jobs:
  # ============================================================================
  # PARALLEL: Quality Checks (no setup dependency — each job self-caches)
  # ============================================================================
  lint-frontend:
    name: 🔍 Lint & Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:js

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run Stylelint
        run: pnpm lint:css

      - name: Run Prettier
        run: pnpm format:check

      - name: Run JS tests
        run: pnpm test:js

  lint-php:
    name: 🔍 Lint PHP
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-vendor-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP Syntax Check
        run: find includes/ -name "*.php" -exec php -l {} \; > /dev/null && echo "PHP syntax valid"

      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml.dist includes/ src/

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G --verbose

  # ============================================================================
  # Build Assets (always runs so tests have artifacts; release check inline)
  # ============================================================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-php]
    timeout-minutes: 5

    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if commit triggers release
        id: check
        run: |
          LATEST_COMMIT=$(git log -1 --pretty=format:"%s")
          echo "Latest commit: $LATEST_COMMIT"

          if echo "$LATEST_COMMIT" | grep -qE '^(feat|fix|perf)!?:|^(feat|fix|perf).*BREAKING CHANGE'; then
            echo "Release-triggering commit detected"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "Non-release commit (docs/style/refactor/test/etc)"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build assets
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 7

  # ============================================================================
  # Test: All PHPUnit suites in a single wp-env instance (runs on every PR/push)
  # ============================================================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, zip, xdebug
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-vendor-

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Start wp-env
        run: |
          pnpm env:start
          pnpm wp-env run tests-cli -- wp --info

      - name: Setup theme directory
        run: |
          pnpm wp-env run tests-cli -- bash -c "
            cd /var/www/html/wp-content/themes/
            if [ -d 'Aggressive-Apparel' ] && [ ! -d 'aggressive-apparel' ]; then
              ln -sf Aggressive-Apparel aggressive-apparel
              echo 'Created symlink: Aggressive-Apparel -> aggressive-apparel'
            fi
          "

      - name: Install dependencies in wp-env
        run: pnpm wp-env run tests-cli -- bash -c "cd /var/www/html/wp-content/themes/${{ env.THEME_SLUG }} && composer install --no-interaction --prefer-dist"

      - name: Run unit tests (with coverage)
        run: pnpm wp-env run tests-cli -- bash -c "cd /var/www/html/wp-content/themes/${{ env.THEME_SLUG }} && ./vendor/bin/phpunit --testsuite=unit --coverage-clover=coverage-unit.xml"

      - name: Run integration tests
        run: pnpm wp-env run tests-cli -- bash -c "cd /var/www/html/wp-content/themes/${{ env.THEME_SLUG }} && ./vendor/bin/phpunit --testsuite=integration --verbose"

      - name: Run security tests
        run: pnpm wp-env run tests-cli -- bash -c "cd /var/www/html/wp-content/themes/${{ env.THEME_SLUG }} && ./vendor/bin/phpunit --testsuite=security --verbose"

      - name: Run accessibility tests
        run: pnpm wp-env run tests-cli -- bash -c "cd /var/www/html/wp-content/themes/${{ env.THEME_SLUG }} && ./vendor/bin/phpunit --testsuite=accessibility --verbose"

      - name: Run performance tests
        run: pnpm wp-env run tests-cli -- bash -c "cd /var/www/html/wp-content/themes/${{ env.THEME_SLUG }} && ./vendor/bin/phpunit --testsuite=performance --verbose"

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-unit.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Package Theme
  # ============================================================================
  package:
    name: 📦 Package Theme
    runs-on: ubuntu-latest
    needs: [build, test]
    if: success() && needs.build.outputs.should_release == 'true'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Verify build artifacts exist
        run: |
          echo "Checking build artifacts..."
          ls -la build/
          echo "Build artifacts verified"

      - name: Clean development files
        run: |
          echo "Removing development files..."
          # Remove directories
          rm -rf node_modules src tests .github .husky .vscode bin

          # Remove lock files
          rm -f pnpm-lock.yaml composer.lock

          # Remove config files
          rm -f webpack.* tsconfig.* eslint.config.js .stylelintrc.json postcss.config.cjs
          rm -f phpunit.xml* phpstan.* phpcs.xml* commitlint.config.mjs .releaserc.json
          rm -f jest.config.mjs

          # Remove specific dotfiles
          rm -f .wp-env.json .editorconfig .gitignore .gitattributes

          # Remove dev dependency files
          rm -f package.json composer.json

          echo "Development files removed"

      - name: Create theme package
        run: |
          echo "Creating theme package..."

          # Use lowercase name for WordPress theme directory inside ZIP
          THEME_SLUG_LOWER=$(echo "${{ env.THEME_SLUG }}" | tr '[:upper:]' '[:lower:]')

          # Create temp directory for packaging
          TEMP_DIR="${{ env.THEME_SLUG }}-temp"
          mkdir -p "../${TEMP_DIR}/${THEME_SLUG_LOWER}"

          # Copy all files to temp directory with lowercase directory name
          cp -r * "../${TEMP_DIR}/${THEME_SLUG_LOWER}/"

          # Create zip from temp directory
          cd "../${TEMP_DIR}"
          zip -r "${THEME_SLUG_LOWER}.zip" "${THEME_SLUG_LOWER}" \
            -x "**/.git/*" \
            -x "**/.DS_Store" \
            -x "**/Thumbs.db"

          # Move zip back to original directory
          mv "${THEME_SLUG_LOWER}.zip" "../${{ env.THEME_SLUG }}/"

          # Clean up temp directory
          cd ..
          rm -rf "${TEMP_DIR}"

          # Return to theme directory
          cd ${{ env.THEME_SLUG }}

          echo "Package created: $(ls -lh aggressive-apparel.zip)"

      - name: Upload theme package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.THEME_SLUG }}-package
          path: aggressive-apparel.zip
          retention-days: 30

  # ============================================================================
  # Release (Only on main/master)
  # ============================================================================
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [package]
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download theme package
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.THEME_SLUG }}-package
          path: ./

      - name: Verify package exists
        run: |
          echo "Verifying package..."
          ls -lh aggressive-apparel.zip
          echo "Package verified"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: pnpm semantic-release

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-php, build, test, package]
    if: always()

    steps:
      - name: Check status
        run: |
          echo "## CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if this was a release-worthy commit
          SHOULD_RELEASE="${{ needs.build.outputs.should_release }}"
          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "**Release-worthy commit detected** — Full pipeline (incl. packaging) executed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Non-release commit** — Quality checks, build and tests executed (packaging skipped)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (ESLint + Stylelint + Prettier + JS Tests) | ${{ needs.lint-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Lint (syntax + PHPCS + PHPStan) | ${{ needs.lint-php.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests (unit + integration + security + a11y + perf) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "| Package | ${{ needs.package.result }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Package | skipped (non-release) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.lint-frontend.result }}" = "success" ] && \
             [ "${{ needs.lint-php.result }}" = "success" ] && \
             [ "${{ needs.build.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Quality checks, build and tests passed!" >> $GITHUB_STEP_SUMMARY
          fi
